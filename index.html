<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Webhook Trigger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #0078D7;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #005fa3;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trigger Jenkins Webhook</h2>

    <input
        type="text"
        id="webhookUrl"
        placeholder="Enter Jenkins Webhook URL">

    <button onclick="triggerWebhook()">
        Trigger Build
    </button>

    <p id="result"></p>
</div>

<script>
async function triggerWebhook() {
    const url = document.getElementById("webhookUrl").value;
    const result = document.getElementById("result");

    if (!url) {
        result.style.color = "red";
        result.textContent = "Please enter a webhook URL.";
        return;
    }

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                event: "manual-trigger",
                timestamp: new Date().toISOString()
            })
        });

        if (response.ok) {
            result.style.color = "green";
            result.textContent = "Webhook triggered successfully!";
        } else {
            result.style.color = "red";
            result.textContent = `Failed (${response.status})`;
        }
    } catch (err) {
        result.style.color = "red";
        result.textContent = "Error: " + err.message;
    }
}
</script>

</body>
</html>
